<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronote GOAT Average Installer</title>
  <style>
    body {
      background: #0b0b0e;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .installer-card {
      background: #111116;
      border: 2px solid #22222a;
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }
    h1 {
      color: #fff;
      font-size: 28px;
      margin-top: 0;
      letter-spacing: -0.5px;
    }
    p {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .drag-box {
      display: block;
      padding: 40px 20px;
      background: linear-gradient(135deg, #7F00FF, #FF007F);
      color: white;
      text-decoration: none;
      font-weight: 900;
      font-size: 20px;
      border-radius: 16px;
      cursor: grab;
      box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
      transition: all 0.2s ease-in-out;
      border: 2px dashed rgba(255,255,255,0.4);
      margin-bottom: 20px;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    .drag-box:active {
      cursor: grabbing;
      transform: scale(0.98);
    }
    .drag-box:hover {
      border-color: #fff;
      box-shadow: 0 0 40px rgba(255, 0, 127, 0.6);
    }
    .copy-btn {
      width: 100%;
      padding: 14px;
      background: #22222a;
      color: #00FFFF;
      border: 1px solid #00FFFF;
      font-weight: bold;
      font-size: 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: #00FFFF;
      color: #000;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <div class="installer-card">
    <h1>🐐 Pronote Average Setup</h1>
    <p>Drag this block to your bookmarks bar. When clicked on Pronote, a gorgeous cybernetic heads-up display will slide into view with all your statistics!</p>
    
    <a id="goat-bookmarklet" class="drag-box" href="#">
      ➔ DRAG THIS GIANT BLOCK TO BOOKMARKS BAR
    </a>

    <button class="copy-btn" id="copy-btn" onclick="copyCode()">
      Alternative: Copy Code to Clipboard
    </button>
  </div>

  <script>
    const setupBookmarklet = function() {
        
        function requestLanguageSelection(callback) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:flex;justify-content:center;align-items:center;z-index:999999;font-family:sans-serif;';

            const bar = document.createElement('div');
            bar.style.cssText = 'display:flex;background:#111116;border:2px solid #7F00FF;border-radius:16px;padding:25px;box-shadow:0 0 40px rgba(127,0,255,0.6);max-width:600px;width:90%;gap:15px;text-align:center;flex-direction:column;';

            const title = document.createElement('div');
            title.innerText = "LANGUAGE";
            title.style.cssText = 'color:#00FFFF;font-weight:900;font-size:14px;letter-spacing:3px;margin-bottom:10px;font-family:monospace;';
            bar.appendChild(title);

            const btnContainer = document.createElement('div');
            btnContainer.style.cssText = 'display:flex;gap:15px;';

            const baseBtnStyle = 'flex:1;padding:20px;font-size:1.5rem;font-weight:900;cursor:pointer;border:none;border-radius:10px;background:#fff;color:#000;transition:all 0.2s;font-family:monospace;';

            const enBtn = document.createElement('button');
            enBtn.innerText = "ENGLISH";
            enBtn.style.cssText = baseBtnStyle;
            enBtn.onmouseenter = () => { enBtn.style.background = '#00FFFF'; };
            enBtn.onmouseleave = () => { enBtn.style.background = '#fff'; };

            const frBtn = document.createElement('button');
            frBtn.innerText = "FRANCAIS";
            frBtn.style.cssText = baseBtnStyle;
            frBtn.onmouseenter = () => { frBtn.style.background = '#FF007F'; frBtn.style.color = '#fff'; };
            frBtn.onmouseleave = () => { frBtn.style.background = '#fff'; frBtn.style.color = '#000'; };

            enBtn.onclick = () => { document.body.removeChild(overlay); callback('EN'); };
            frBtn.onclick = () => { document.body.removeChild(overlay); callback('FR'); };

            btnContainer.appendChild(enBtn);
            btnContainer.appendChild(frBtn);
            bar.appendChild(btnContainer);
            overlay.appendChild(bar);
            document.body.appendChild(overlay);
        }

        function initExecution(selectedLang) {
            const systemLexicon = {
                EN: {
                    banner: "MOYENNE GENERALE BY THE G.O.A.T",
                    summaryTitle: "CORE SYSTEM METRICS",
                    apexGrade: "HIGHEST GRADE",
                    nadirGrade: "LOWEST GRADE",
                    modulesCount: "ACTIVE PLUGINS",
                    badgeLabel: "FINAL WEIGHTED PROFILE",
                    closeBtn: "TERMINATE SESSION",
                    tiers: {
                        excellent: "💎 EXCELLENT", good: "✅ GOOD", average: "acceptable ig", poor: "gng lock in", critical: "drop out atp"
                    }
                },
                FR: {
                    banner: "MOYENNE GENERALE PAR LE G.O.A.T",
                    summaryTitle: "METRIQUES SYSTEME CENTRAL",
                    apexGrade: "NOTE LA PLUS HAUTE",
                    nadirGrade: "NOTE LA PLUS BASSE",
                    modulesCount: "MODULES CHARGES",
                    badgeLabel: "PROFIL DE LA MOYENNE GENERALE",
                    closeBtn: "FERMER LA SESSION",
                    tiers: {
                        excellent: "💎 EXCELLENT", good: "✅ BON", average: "⚠️ MOYEN", poor: "❌ REVISE UN PEU", critical: "🚨 SON 😭✌️"
                    }
                }
            };

            const uiText = systemLexicon[selectedLang];
            let uniqueSubjects = new Map();
            const monthsAndDates = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec', 'janv', 'févr', 'mars', 'avr', 'mai', 'juin', 'juil', 'sept', 'oct', 'nov', 'déc'];
            const shortValidSubjects = ['emc', 'eps', 'art', 'ses', 'hg', 'svt', 'pc', 'mat', 'eps.', 'tp', 'hist-geo-emc'];

            function scanVisibleElements() {
                let rawElementsLog = [];
                function gatherAllElements(node) {
                    if (!node) return;
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        const text = node.innerText || node.textContent || "";
                        if (text && text.length > 3 && text.length < 100) {
                            rawElementsLog.push(text.replace(/\s+/g, ' ').trim());
                        }
                    }
                    node.childNodes.forEach(gatherAllElements);
                    if (node.shadowRoot) gatherAllElements(node.shadowRoot);
                }
                gatherAllElements(document.body);
                let cleanBlocks = [...new Set(rawElementsLog)];

                cleanBlocks.forEach(line => {
                    if (/average|classe|class's|grade of|\/10|\/20|quiz|dissertation|devoir|test|eval|lowest|highest|coefficient/i.test(line)) return;
                    const numbers = line.replace(',', '.').match(/\d+(\.\d+)?/g);
                    if (numbers && numbers.length === 1) {
                        const currentAvg = parseFloat(numbers);
                        if (currentAvg >= 10.0 && currentAvg <= 20.0) {
                            let subjectName = line.replace(/[0-9.,]/g, '').trim();
                            const lowerName = subjectName.toLowerCase();
                            if (monthsAndDates.includes(lowerName)) return; 
                            if (subjectName.length < 4 && !shortValidSubjects.includes(lowerName)) return;

                            if (!uniqueSubjects.has(subjectName)) {
                                uniqueSubjects.set(subjectName, currentAvg);
                            }
                        }
                    }
                });
            }

            const allElements = document.querySelectorAll('*');
            let scrollablePanels = [];
            allElements.forEach(el => {
                if (el.scrollHeight > el.clientHeight) scrollablePanels.push(el);
            });
            scrollablePanels.push(window);

            let currentStep = 0;
            const totalSteps = 20;
            const scrollChunk = 250;

            function processUniversalScroll() {
                scrollablePanels.forEach(panel => {
                    if (panel === window) window.scrollBy(0, scrollChunk);
                    else panel.scrollTop += scrollChunk;
                });

                scanVisibleElements();
                currentStep++;

                if (currentStep < totalSteps) {
                    setTimeout(processUniversalScroll, 100);
                } else {
                    scrollablePanels.forEach(panel => {
                        if (panel === window) window.scrollTo(0, 0);
                        else panel.scrollTop = 0;
                    });
                    renderCyberOverlay();
                }
            }

            function renderCyberOverlay() {
                let totalPoints = 0;
                let ranks = [];

                const mainContainer = document.createElement('div');
                mainContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,8,0.95);backdrop-filter:blur(10px);z-index:9999999;font-family:monospace;color:#fff;overflow-y:auto;padding:40px 20px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;';

                const frame = document.createElement('div');
                frame.style.cssText = 'max-width:650px;width:100%;background:#111116;border:2px solid #22222a;border-radius:20px;padding:30px;box-shadow:0 25px 70px rgba(0,0,0,0.8);box-sizing:border-box;';

                const header = document.createElement('div');
                header.innerText = `🐐 ${uiText.banner} 🐐`;
                header.style.cssText = 'background:linear-gradient(90deg,#FF007F,#7F00FF,#00FFFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px;font-weight:900;text-align:center;margin-bottom:30px;letter-spacing:1px;';
                frame.appendChild(header);

                uniqueSubjects.forEach((avg, name) => {
                    totalPoints += avg;
                    ranks.push(avg);

                    const filledBlocks = Math.round(avg);
                    const emptyBlocks = 20 - filledBlocks;
                    const energyBar = "#".repeat(filledBlocks) + "-".repeat(emptyBlocks);

                    let color, tierText;
                    if (avg >= 18.0) { color = '#00FF66'; tierText = uiText.tiers.excellent; }
                    else if (avg >= 16.0) { color = '#00E5FF'; tierText = uiText.tiers.good; }
                    else if (avg >= 10.0) { color = '#FFD600'; tierText = uiText.tiers.average; }
                    else if (avg >= 5.0) { color = '#FF9100'; tierText = uiText.tiers.poor; }
                    else { color = '#FF5252'; tierText = uiText.tiers.critical; }

                    const row = document.createElement('div');
                    row.style.cssText = 'margin-bottom:18px;padding-bottom:12px;border-bottom:1px dashed #22222a;';

                    const nameLabel = document.createElement('div');
                    nameLabel.innerText = `🪐 [NODE]: ${name.toUpperCase()}`;
                    nameLabel.style.cssText = 'font-weight:bold;font-size:13px;color:#94a3b8;margin-bottom:4px;';
                    
                    const barMetrics = document.createElement('div');
                    barMetrics.style.cssText = 'display:flex;justify-content:space-between;align-items:center;font-size:14px;gap:10px;flex-wrap:wrap;';
                    
                    const barGraphic = document.createElement('span');
                    barGraphic.innerText = `[${energyBar}]`;
                    barGraphic.style.cssText = `color:${color};font-weight:bold;letter-spacing:1px;`;

                    const metaGroup = document.createElement('span');
                    metaGroup.innerHTML = `<span style="border:1px solid ${color};color:${color};padding:1px 5px;border-radius:4px;font-size:11px;margin-right:8px;font-weight:bold;">${tierText}</span> <span style="font-weight:bold;">${avg.toFixed(2)}/20</span>`;

                    barMetrics.appendChild(barGraphic);
                    barMetrics.appendChild(metaGroup);
                    row.appendChild(nameLabel);
                    row.appendChild(barMetrics);
                    frame.appendChild(row);
                });

                const finalCalculatedAverage = totalPoints / uniqueSubjects.size;
                const highestOfAll = Math.max(...ranks);
                const lowestOfAll = Math.min(...ranks);

                const statsBlock = document.createElement('div');
                statsBlock.style.cssText = 'margin-top:25px;background:#161622;border:1px solid #2d2d3d;border-radius:12px;padding:15px;font-size:13px;';
                statsBlock.innerHTML = `
                    <div style="color:#7F00FF;font-weight:900;margin-bottom:10px;letter-spacing:1px;">=== ${uiText.summaryTitle} ===</div>
                    <div style="margin-bottom:6px;">🚀 ${uiText.apexGrade} : <span style="color:#00FF66;font-weight:bold;">${highestOfAll.toFixed(2)} / 20</span></div>
                    <div style="margin-bottom:6px;">💥 ${uiText.nadirGrade} : <span style="color:#FF007F;font-weight:bold;">${lowestOfAll.toFixed(2)} / 20</span></div>
                    <div>🔮 ${uiText.modulesCount} : <span style="color:#00E5FF;font-weight:bold;">${uniqueSubjects.size}</span></div>
                `;
                frame.appendChild(statsBlock);

                const finalScoreBadge = document.createElement('div');
                finalScoreBadge.style.cssText = 'margin-top:25px;text-align:center;';
                finalScoreBadge.innerHTML = `
                    <div style="color:#00FFFF;font-size:12px;font-weight:bold;letter-spacing:2px;margin-bottom:5px;">— ${uiText.badgeLabel} —</div>
                    <div style="font-size:36px;font-weight:900;color:#00FFFF;text-shadow:0 0 15px #00FFFF;background:#050508;border:2px solid #00FFFF;border-radius:12px;padding:15px 0;">✨ ${finalCalculatedAverage.toFixed(2)} / 20 ✨</div>
                `;
                frame.appendChild(finalScoreBadge);

                const closeButton = document.createElement('button');
                closeButton.innerText = uiText.closeBtn;
                closeButton.style.cssText = 'width:100%;margin-top:25px;padding:14px;background:#22222a;color:#fff;border:1px solid #333344;border-radius:10px;cursor:pointer;font-weight:bold;font-family:monospace;transition:all 0.2s;';
                closeButton.onmouseenter = () => { closeButton.style.background = '#FF5252'; closeButton.style.borderColor = '#FF5252'; };
                closeButton.onmouseleave = () => { closeButton.style.background = '#22222a'; closeButton.style.borderColor = '#333344'; };
                closeButton.onclick = () => { document.body.removeChild(mainContainer); };
                frame.appendChild(closeButton);

                mainContainer.appendChild(frame);
                document.body.appendChild(mainContainer);
            }

            processUniversalScroll();
        }

        requestLanguageSelection(initExecution);
    };

    const executableString = "javascript:(" + encodeURIComponent(setupBookmarklet.toString()) + ")();";
    document.getElementById('goat-bookmarklet').href = executableString;

    function copyCode() {
        navigator.clipboard.writeText(executableString);
        const btn = document.getElementById('copy-btn');
        btn.innerText = "✓ Code Copied! Now paste into a bookmark URL";
        btn.style.borderColor = "#00FF66";
        btn.style.color = "#00FF66";
        setTimeout(() => {
            btn.innerText = "Alternative: Copy Code to Clipboard";
            btn.style.borderColor = "#00FFFF";
            btn.style.color = "#00FFFF";
        }, 3000);
    }
  </script>
</body>
</html>
