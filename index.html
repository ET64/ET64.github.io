<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronote GOAT Average Installer</title>
  <style>
    body {
      background: #0b0b0e;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .installer-card {
      background: #111116;
      border: 2px solid #22222a;
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }
    h1 {
      color: #fff;
      font-size: 28px;
      margin-top: 0;
      letter-spacing: -0.5px;
    }
    p {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    /* GIANT un-missable drag box */
    .drag-box {
      display: block;
      padding: 40px 20px;
      background: linear-gradient(135deg, #7F00FF, #FF007F);
      color: white;
      text-decoration: none;
      font-weight: 900;
      font-size: 20px;
      border-radius: 16px;
      cursor: grab;
      box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
      transition: all 0.2s ease-in-out;
      border: 2px dashed rgba(255,255,255,0.4);
      margin-bottom: 20px;

      /* THE FIX: Stops the browser from accidentally selecting the text inside */
      -webkit-user-select: none; /* Safari */
      -moz-user-select: none;    /* Firefox */
      -ms-user-select: none;     /* Legacy Edge */
      user-select: none;         /* Modern Standard */
    }
    .drag-box:active {
      cursor: grabbing;
      transform: scale(0.98);
    }
    .drag-box:hover {
      border-color: #fff;
      box-shadow: 0 0 40px rgba(255, 0, 127, 0.6);
    }
    /* Smooth Copy Button alternative */
    .copy-btn {
      width: 100%;
      padding: 14px;
      background: #22222a;
      color: #00FFFF;
      border: 1px solid #00FFFF;
      font-weight: bold;
      font-size: 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: #00FFFF;
      color: #000;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <div class="installer-card">
    <h1>🐐 Pronote Average Setup</h1>
    <p>Choose the easiest method to share or install the script onto your browser's Bookmarks Bar:</p>
    
    <a id="goat-bookmarklet" class="drag-box" href="#">
      ➔ DRAG THIS GIANT BLOCK TO BOOKMARKS BAR
    </a>

  </div>

  <script>
    const setupBookmarklet = function() {
        
        function requestLanguageSelection(callback) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);backdrop-filter:blur(5px);display:flex;justify-content:center;align-items:center;z-index:999999;font-family:sans-serif;';

            const bar = document.createElement('div');
            bar.style.cssText = 'display:flex;background:#111116;border:2px solid #7F00FF;border-radius:16px;padding:15px;box-shadow:0 0 30px rgba(127,0,255,0.5);max-width:700px;width:90%;gap:15px;';

            const baseBtnStyle = 'flex:1;padding:25px 20px;font-size:1.8rem;font-weight:900;cursor:pointer;border:none;border-radius:10px;background:#fff;color:#000;transition:all 0.2s ease-in-out;';

            const enBtn = document.createElement('button');
            enBtn.innerText = "ENGLISH ?";
            enBtn.style.cssText = baseBtnStyle;
            enBtn.onmouseenter = () => { enBtn.style.background = '#00FFFF'; enBtn.style.transform = 'scale(1.03)'; };
            enBtn.onmouseleave = () => { enBtn.style.background = '#fff'; enBtn.style.transform = 'scale(1)'; };

            const frBtn = document.createElement('button');
            frBtn.innerText = "FRANCAIS ?";
            frBtn.style.cssText = baseBtnStyle;
            frBtn.onmouseenter = () => { frBtn.style.background = '#FF007F'; frBtn.style.color = '#fff'; frBtn.style.transform = 'scale(1.03)'; };
            frBtn.onmouseleave = () => { frBtn.style.background = '#fff'; frBtn.style.color = '#000'; frBtn.style.transform = 'scale(1)'; };

            enBtn.onclick = () => { document.body.removeChild(overlay); callback('EN'); };
            frBtn.onclick = () => { document.body.removeChild(overlay); callback('FR'); };

            bar.appendChild(enBtn);
            bar.appendChild(frBtn);
            overlay.appendChild(bar);
            document.body.appendChild(overlay);
        }

        function initExecution(selectedLang) {
            const systemLexicon = {
                EN: {
                    booting: "67?...",
                    banner: "Moyenne Générale made by the G.O.A.T 🐐",
                    moduleNode: "🪐 [MODULE NODE] ────►",
                    summaryTitle: "DATA",
                    apexGrade: "  ┝ 🟢 HIGHEST GRADE :",
                    nadirGrade: "  ┝ 🔴 LOWEST GRADE  :",
                    modulesCount: "  ┝ 🔮 PLUGINS  :",
                    subjectsLoaded: "Subjects Loaded",
                    badgeLabel: " FINAL WEIGHTED GENERAL AVERAGE PROFILE ",
                    tiers: {
                        excellent: "💎 EXCELLENT", good: "✅ GOOD", average: "gng lock in", poor: "drop out atp", critical: "🚨 CRITICAL FAILURE"
                    }
                },
                FR: {
                    booting: "67?...",
                    banner: "Moyenne Générale fait par le G.O.A.T 🐐",
                    moduleNode: "🪐 [NODE MODULE] ────►",
                    summaryTitle: "DONNÉES",
                    apexGrade: "  ┝ 🟢 NOTE LA PLUS HAUTE :",
                    nadirGrade: "  ┝ 🔴 NOTE LA PLUS BASSE  :",
                    modulesCount: "  ┝ 🔮 MODULES  :",
                    subjectsLoaded: "Matières Chargées",
                    badgeLabel: " PROFIL DE LA MOYENNE GÉNÉRALE PONDÉRÉE FINALE ",
                    tiers: {
                        excellent: "💎 EXCELLENT", good: "✅ BON", average: "⚠️ MOYEN", poor: "révise un peu (moi perso j'ai jamais révisé j'ai jamais eu moins que 13)", critical: "SON 😭✌️"
                    }
                }
            };

            const uiText = systemLexicon[selectedLang];
            console.clear();
            console.log(`%c${uiText.booting}`, "color: #00FFCC; font-family: monospace; font-size: 11px;");

            let uniqueSubjects = new Map();
            const monthsAndDates = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec', 'janv', 'févr', 'mars', 'avr', 'mai', 'juin', 'juil', 'sept', 'oct', 'nov', 'déc'];
            const shortValidSubjects = ['emc', 'eps', 'art', 'ses', 'hg', 'svt', 'pc', 'mat', 'eps.', 'tp', 'hist-geo-emc'];

            function scanVisibleElements() {
                let rawElementsLog = [];
                function gatherAllElements(node) {
                    if (!node) return;
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        const text = node.innerText || node.textContent || "";
                        if (text && text.length > 3 && text.length < 100) {
                            rawElementsLog.push(text.replace(/\s+/g, ' ').trim());
                        }
                    }
                    node.childNodes.forEach(gatherAllElements);
                    if (node.shadowRoot) gatherAllElements(node.shadowRoot);
                }
                gatherAllElements(document.body);
                let cleanBlocks = [...new Set(rawElementsLog)];

                cleanBlocks.forEach(line => {
                    if (/average|classe|class's|grade of|\/10|\/20|quiz|dissertation|devoir|test|eval|lowest|highest|coefficient/i.test(line)) return;
                    const numbers = line.replace(',', '.').match(/\d+(\.\d+)?/g);
                    if (numbers && numbers.length === 1) {
                        const currentAvg = parseFloat(numbers);
                        if (currentAvg >= 10.0 && currentAvg <= 20.0) {
                            let subjectName = line.replace(/[0-9.,]/g, '').trim();
                            const lowerName = subjectName.toLowerCase();
                            if (monthsAndDates.includes(lowerName)) return; 
                            if (subjectName.length < 4 && !shortValidSubjects.includes(lowerName)) return;

                            if (!uniqueSubjects.has(subjectName)) {
                                uniqueSubjects.set(subjectName, currentAvg);
                            }
                        }
                    }
                });
            }

            const allElements = document.querySelectorAll('*');
            let scrollablePanels = [];
            allElements.forEach(el => {
                if (el.scrollHeight > el.clientHeight) scrollablePanels.push(el);
            });
            scrollablePanels.push(window);

            let currentStep = 0;
            const totalSteps = 20;
            const scrollChunk = 250;

            function processUniversalScroll() {
                scrollablePanels.forEach(panel => {
                    if (panel === window) window.scrollBy(0, scrollChunk);
                    else panel.scrollTop += scrollChunk;
                });

                scanVisibleElements();
                currentStep++;

                if (currentStep < totalSteps) {
                    setTimeout(processUniversalScroll, 120);
                } else {
                    scrollablePanels.forEach(panel => {
                        if (panel === window) window.scrollTo(0, 0);
                        else panel.scrollTop = 0;
                    });
                    renderResponsiveDashboard();
                }
            }

            function renderResponsiveDashboard() {
                console.clear();
                let totalPoints = 0;
                let ranks = [];

                console.log(`%c${uiText.banner}`, "color: #FFF; background: linear-gradient(90deg, #FF007F, #7F00FF, #00FFFF, #FF007F); font-size: 24px; font-weight: 900; font-family: sans-serif; padding: 20px; text-shadow: 0 0 10px #FF007F, 0 0 20px #00FFFF; border-radius: 8px; text-align: center; display: block; width: 85%; margin: auto;");
                console.log("\n");

                uniqueSubjects.forEach((avg, name) => {
                    totalPoints += avg;
                    ranks.push(avg);

                    const filledBlocks = Math.round(avg);
                    const emptyBlocks = 20 - filledBlocks;
                    const energyBar = "█".repeat(filledBlocks) + "░".repeat(emptyBlocks);

                    let hexColor, termLabel, badgeCss;
                    if (avg >= 18.0) { hexColor = "#00FF66"; termLabel = uiText.tiers.excellent; badgeCss = `color: #00FF66; border: 1px solid #00FF66; box-shadow: 0 0 8px #00FF66;`; }
                    else if (avg >= 16.0) { hexColor = "#00E5FF"; termLabel = uiText.tiers.good; badgeCss = `color: #00E5FF; border: 1px solid #00E5FF;`; }
                    else if (avg >= 10.0) { hexColor = "#FFD600"; termLabel = uiText.tiers.average; badgeCss = `color: #FFD600; border: 1px solid #FFD600;`; }
                    else if (avg >= 5.0) { hexColor = "#FF9100"; termLabel = uiText.tiers.poor; badgeCss = `color: #FF9100; border: 1px solid #FF9100;`; }
                    else { hexColor = "#FF5252"; termLabel = uiText.tiers.critical; badgeCss = `color: #FF5252; border: 1px solid #FF5252;`; }

                    console.log(`%c ${uiText.moduleNode} ${name.toUpperCase()}`, "color: #FFF; font-weight: bold; font-family: monospace; font-size: 13px;");
                    console.log(`%c    ${energyBar} %c %c ${termLabel} %c %c [ ${avg.toFixed(2)} / 20 ] `, `color:${hexColor}; font-size:16px; font-family:monospace;`, "background:transparent; margin-right:5px;", `${badgeCss} font-weight:bold; font-size:10px; padding:2px 6px; border-radius:4px;`, "background:transparent; margin-right:5px;", `color:#FFF; background:#111116; font-weight:bold; font-family:monospace; padding:2px 8px; border-radius:4px; border-left:3px solid ${hexColor};`);
                    console.log(" ");
                });

                const finalCalculatedAverage = totalPoints / uniqueSubjects.size;
                const highestOfAll = Math.max(...ranks);
                const lowestOfAll = Math.min(...ranks);

                console.log(`\n%c${uiText.summaryTitle}`, "color: #7F00FF; font-weight: 900; font-family: sans-serif; font-size: 12px; letter-spacing: 2px;");
                console.log(`%c${uiText.apexGrade} %c${highestOfAll.toFixed(2)} / 20`, "color: #94A3B8;", "color: #00FF66; font-weight: bold; font-size: 13px;");
                console.log(`%c${uiText.nadirGrade} %c${lowestOfAll.toFixed(2)} / 20`, "color: #94A3B8;", "color: #FF007F; font-weight: bold; font-size: 13px;");
                console.log(`%c${uiText.modulesCount} %c${uniqueSubjects.size} ${uiText.subjectsLoaded}`, "color: #94A3B8;", "color: #00E5FF; font-weight: bold; font-size: 13px;");
                
                console.log(`\n%c${uiText.badgeLabel}`, "color: #111; background: #00FFFF; font-size: 12px; font-weight: bold; padding: 6px; border-radius: 6px 6px 0 0; text-align: center; display: block; width: 85%; margin: auto;");
                console.log(`%c\n ✨  ${finalCalculatedAverage.toFixed(2)} / 20  ✨ \n%c`, "color: #00FFFF; background: #000; font-size: 32px; font-weight: 900; font-family: sans-serif; text-shadow: 0 0 15px #00FFFF, 0 0 30px #7F00FF; text-align: center; border: 2px solid #00FFFF; border-radius: 0 0 6px 6px; padding: 12px 0; display: block; width: 85%; margin: auto;", "font-size: 1px;");
            }

            processUniversalScroll();
        }

        requestLanguageSelection(initExecution);
    };

    const executableString = "javascript:(" + encodeURIComponent(setupBookmarklet.toString()) + ")();";
    document.getElementById('goat-bookmarklet').href = executableString;

  </script>
</body>
</html>
